<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Good Morning</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --dawn-deep: #1a0a2e;
      --gold: #f0a500;
      --blush: #f7d1a0;
      --cream: #fdf3e3;
      --horizon: #c45c3a;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: 'Cormorant Garamond', serif;
      overflow: hidden;
    }

    .page {
      position: fixed;
      inset: 0;
      transition: opacity 0.8s ease, transform 0.8s ease;
    }

    .page.hidden {
      opacity: 0;
      pointer-events: none;
      transform: scale(1.03);
    }

    /* LOGIN PAGE */

    #login-page {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0b0b14;
      z-index: 20;
    }

    #login-page::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 30% 55%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 55% 10%, rgba(255,255,255,0.35) 0%, transparent 100%),
        radial-gradient(1px 1px at 75% 40%, rgba(255,255,255,0.25) 0%, transparent 100%),
        radial-gradient(1px 1px at 88% 70%, rgba(255,255,255,0.3) 0%, transparent 100%);
      pointer-events: none;
    }

    #login-page::after {
      content: '';
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(240,165,0,0.07) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .login-box {
      position: relative;
      z-index: 2;
      width: min(420px, 90vw);
      padding: 3rem 2.5rem;
      border: 1px solid rgba(240,165,0,0.15);
      border-radius: 2px;
      background: rgba(255,255,255,0.02);
      backdrop-filter: blur(12px);
      animation: boxReveal 0.8s ease both;
    }

    @keyframes boxReveal {
      from {
        opacity: 0;
        transform: translateY(24px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .login-eyebrow {
      font-size: 0.7rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0.7;
      margin-bottom: 0.4rem;
    }

    .login-title {
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem;
      font-weight: 700;
      color: var(--cream);
      line-height: 1.1;
      margin-bottom: 0.3rem;
    }

    .login-title span {
      font-style: italic;
      font-weight: 400;
      color: var(--gold);
    }

    .login-sub {
      font-size: 0.9rem;
      color: rgba(253,243,227,0.4);
      margin-bottom: 2.2rem;
      font-weight: 300;
    }

    .field {
      margin-bottom: 1.2rem;
    }

    .field label {
      display: block;
      font-size: 0.72rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(253,243,227,0.5);
      margin-bottom: 0.5rem;
    }

    .field input {
      width: 100%;
      padding: 0.75rem 1rem;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(240,165,0,0.2);
      border-radius: 2px;
      color: var(--cream);
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.3s, background 0.3s;
    }

    .field input:focus {
      border-color: rgba(240,165,0,0.6);
      background: rgba(240,165,0,0.05);
    }

    .field input::placeholder {
      color: rgba(253,243,227,0.2);
    }

    .error-msg {
      font-size: 0.8rem;
      color: #e07070;
      margin-bottom: 1rem;
      min-height: 1.2em;
      letter-spacing: 0.05em;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .error-msg.visible {
      opacity: 1;
    }

    .login-btn {
      width: 100%;
      padding: 0.85rem;
      background: linear-gradient(135deg, var(--gold), var(--horizon));
      border: none;
      border-radius: 2px;
      color: #1a0a00;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.3s, transform 0.2s;
    }

    .login-btn:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(26,10,0,0.3);
      border-top-color: #1a0a00;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* GOOD MORNING PAGE */

    #gm-page {
      z-index: 10;
    }

    .sky {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        180deg,
        #0d0520 0%,
        #2a0d4e 25%,
        #7a2a3a 50%,
        #c45c3a 70%,
        #f0a500 85%,
        #fdf3e3 100%
      );
    }

    .sun {
      position: absolute;
      bottom: 18%;
      left: 50%;
      transform: translateX(-50%);
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 40%, #fff8c0, #f0a500 60%, #c45c3a);
      box-shadow:
        0 0 60px 30px rgba(240,165,0,0.4),
        0 0 120px 60px rgba(240,165,0,0.2);
    }

    .gm-card {
      position: absolute;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    .greeting-label {
      font-size: 0.9rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--blush);
      margin-bottom: 0.5rem;
    }

    .greeting-main {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3.5rem, 10vw, 7rem);
      font-weight: 700;
      color: var(--cream);
      line-height: 1;
    }

    .greeting-italic {
      font-style: italic;
      font-weight: 400;
      font-size: clamp(2rem, 6vw, 4.5rem);
      color: var(--gold);
      display: block;
    }

    .divider {
      width: 80px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 1.5rem auto;
    }

    .subtext {
      font-size: clamp(1rem, 2.5vw, 1.3rem);
      color: var(--blush);
      letter-spacing: 0.08em;
    }

    .user-greeting,
    .time-display {
      margin-top: 1rem;
      color: rgba(253,243,227,0.7);
      letter-spacing: 0.2em;
    }

    .logout-btn {
      margin-top: 2rem;
      padding: 0.5rem 1.5rem;
      background: transparent;
      border: 1px solid rgba(253,243,227,0.2);
      color: rgba(253,243,227,0.7);
      cursor: pointer;
    }

    /* WHATSAPP BUTTON */

    .whatsapp-btn {
      position: fixed;
      top: 25px;
      right: 25px;
      width: 60px;
      height: 60px;
      background: #25D366;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 25px rgba(0,0,0,0.3);
      z-index: 99999;
      transition: transform 0.3s ease, opacity 0.3s ease;
      text-decoration: none;
    }

    .whatsapp-btn:hover {
      transform: scale(1.08);
      opacity: 0.92;
    }

    .whatsapp-icon {
      width: 32px;
      height: 32px;
    }

  </style>
</head>

<body>

  <!-- WHATSAPP BUTTON -->

  <a
    href="https://wa.me/919346579765?text=I%20want%20to%20explore%20more%20on%20this"
    class="whatsapp-btn"
    target="_blank"
  >
    <svg viewBox="0 0 32 32" class="whatsapp-icon">
      <path fill="white"
        d="M19.11 17.38c-.29-.14-1.69-.83-1.95-.92-.26-.1-.45-.14-.64.14-.19.29-.73.92-.9 1.11-.16.19-.33.22-.62.07-.29-.14-1.21-.44-2.31-1.39-.85-.76-1.43-1.69-1.59-1.97-.16-.29-.02-.44.12-.58.13-.13.29-.33.43-.5.14-.17.19-.29.29-.48.1-.19.05-.36-.02-.5-.07-.14-.64-1.54-.88-2.11-.23-.55-.47-.48-.64-.49l-.55-.01c-.19 0-.5.07-.76.36-.26.29-1 1-.97 2.43.02 1.43 1.02 2.8 1.17 2.99.14.19 2 3.06 4.85 4.29.68.29 1.21.47 1.62.6.68.22 1.3.19 1.79.12.55-.08 1.69-.69 1.93-1.36.24-.67.24-1.24.17-1.36-.07-.12-.26-.19-.55-.33z"/>
    </svg>
  </a>

  <!-- LOGIN PAGE -->

  <div class="page" id="login-page">

    <div class="login-box">

      <p class="login-eyebrow">Welcome</p>

      <h1 class="login-title">
        Sign in to <span>begin</span>
      </h1>

      <p class="login-sub">
        Your morning awaits on the other side.
      </p>

      <div class="field">
        <label>Email</label>
        <input
          type="email"
          id="email"
          placeholder="you@example.com"
        />
      </div>

      <div class="field">
        <label>Password</label>
        <input
          type="password"
          id="password"
          placeholder="••••••••"
        />
      </div>

      <p class="error-msg" id="error-msg">
        Invalid email or password.
      </p>

      <button
        class="login-btn"
        id="login-btn"
        onclick="handleLogin()"
      >
        Continue
      </button>

    </div>

  </div>

  <!-- GOOD MORNING PAGE -->

  <div class="page hidden" id="gm-page">

    <div class="sky"></div>

    <div class="sun"></div>

    <div class="gm-card">

      <p class="greeting-label">
        A new day begins
      </p>

      <h1 class="greeting-main">
        Good
        <span class="greeting-italic">
          Morning
        </span>
      </h1>

      <div class="divider"></div>

      <p class="subtext">
        May this day bring you light, joy & wonder.
      </p>

      <p class="user-greeting" id="user-greeting"></p>

      <p class="time-display" id="clock"></p>

      <button
        class="logout-btn"
        onclick="handleLogout()"
      >
        Sign Out
      </button>

    </div>

  </div>

  <script>

    async function handleLogin() {

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('login-btn');

      document.getElementById('error-msg')
        .classList.remove('visible');

      if (!email || !password) {
        showError('Please enter your email and password.');
        return;
      }

      btn.disabled = true;

      btn.innerHTML =
        '<span class="spinner"></span> Signing in…';

      try {

        // CHANGE THIS TO YOUR LIVE BACKEND URL

        const response = await fetch(
          'https://deploy-simple-back-end.onrender.com/api/v1/auth?email='
          + encodeURIComponent(email)
          + '&password='
          + encodeURIComponent(password),
          {
            method: 'GET'
          }
        );

        const text = await response.text();

        if (response.ok) {
          showGoodMorning(email.split('@')[0]);
        } else {
          showError(text || 'Invalid credentials.');
        }

      } catch (err) {

        showError('Unable to connect to server.');

      }

      btn.disabled = false;
      btn.innerHTML = 'Continue';
    }

    function handleLogout() {

      document.getElementById('gm-page')
        .classList.add('hidden');

      document.getElementById('login-page')
        .classList.remove('hidden');
    }

    function showGoodMorning(name) {

      document.getElementById('user-greeting')
        .textContent = `Welcome, ${capitalize(name)}`;

      document.getElementById('login-page')
        .classList.add('hidden');

      document.getElementById('gm-page')
        .classList.remove('hidden');
    }

    function showError(msg) {

      const el = document.getElementById('error-msg');

      el.textContent = msg;

      el.classList.add('visible');
    }

    function capitalize(s) {
      return s.charAt(0).toUpperCase() + s.slice(1);
    }

    function updateClock() {

      const now = new Date();

      const h = String(now.getHours()).padStart(2,'0');
      const m = String(now.getMinutes()).padStart(2,'0');
      const s = String(now.getSeconds()).padStart(2,'0');

      document.getElementById('clock').textContent =
        `${h} : ${m} : ${s}`;
    }

    updateClock();

    setInterval(updateClock, 1000);

    document.addEventListener('keydown', e => {

      if (e.key === 'Enter') {
        handleLogin();
      }

    });

  </script>

</body>
</html>
